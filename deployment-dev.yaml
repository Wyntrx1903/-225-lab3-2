apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-deployment
spec:
  replicas: 1  # Number of NGINX pods to run Changed from 2 to 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: cithit/nashtb:latest     #<-------------------change this to match your MiamiID
        ports:
        - containerPort: 80  # Expose NGINX on port 80
---
apiVersion: networking.k8s.io/v1 #<-------------------- New addition in 3.3 
kind: Ingress
metadata:
  name: nginx
spec:
  rules: 
  - host: 
    http:
      paths:
      - path: /
        pathType: ImplementationSpecific
        backend: 
          service:
            name: dev-service
            port:
              number: 80

---
  apiVersion: v1  #Unchanged
  kind: Service    #Unchanged
  metadata:
    name: dev-service  #Unchanged
    spec:  #Unchanged
      ports:
      - protocol: TCP
        port: 80
        targetPort: 80
        #nodePort: 32000
    selector:
      app: nginx
    #type: NodePort
